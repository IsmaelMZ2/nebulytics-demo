<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nebulytics IA | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #080a0f; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .neo-shadow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.1); }
    </style>
</head>
<body class="p-6 lg:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-black text-white tracking-tighter italic">NEBULYTICS<span class="text-cyan-400">.IA</span></h1>
                <p class="text-gray-500 font-medium">Arquitectura Predictiva para Ecommerce</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="flex h-3 w-3 bg-green-500 rounded-full animate-ping"></span>
                <span class="text-sm font-bold text-green-400">SERVER LIVE</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest px-2">AI Insights</h2>
                {% for alert in alerts %}
                <div id="alert-{{loop.index}}" class="glass p-5 rounded-2xl border-l-4 border-{{alert.color}}-500 transition-all hover:scale-105">
                    <p class="text-xs font-bold text-{{alert.color}}-400 mb-1">{{alert.type}}</p>
                    <p class="text-sm leading-relaxed text-gray-300">{{alert.message}}</p>
                </div>
                {% endfor %}
            </div>

            <div class="lg:col-span-9 space-y-8">
                <div class="glass p-8 rounded-3xl neo-shadow">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-xl font-bold">Proyección de Ingresos Diarios</h3>
                        <div class="flex gap-2">
                            <span class="px-3 py-1 bg-cyan-500/20 text-cyan-400 rounded-lg text-xs font-bold">Prophet Engine</span>
                        </div>
                    </div>
                    <canvas id="mainChart" height="280"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="ai-widget-container"></div>

    <script src="/static/nebulytics-widget.js"></script>
    <script>
        // Configuración inicial de la gráfica
        const ctx = document.getElementById('mainChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: {{ forecast|map(attribute='ds')|list|tojson }},
                datasets: [{
                    label: 'Tendencia Proyectada',
                    data: {{ forecast|map(attribute='yhat')|list|tojson }},
                    borderColor: '#22d3ee',
                    backgroundColor: 'rgba(34, 211, 238, 0.05)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                }
            }
        });

        // Función para que la IA actualice la gráfica
        function updateDashboard(newData) {
            chart.data.labels = newData.map(d => d.ds);
            chart.data.datasets[0].data = newData.map(d => d.yhat);
            chart.update();
        }
    </script>
</body>
</html>
