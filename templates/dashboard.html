<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Nebulytics IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #111018; color: #ffffff; margin: 0; font-family: sans-serif; overflow: hidden; }
        .tab-content { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #9ca3af; cursor: pointer; }
        .nav-link.active { background-color: #1A1924; color: #ffffff; border-left: 3px solid #7950f2; }
        .n-card { background: #1A1924; border: 1px solid #2A2937; border-radius: 12px; padding: 20px; }
        .floating-chat { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: #00e5b5; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; }
        .chat-bubble-bot { background: #1A1924; border: 1px solid #2A2937; border-radius: 16px; padding: 16px; font-size: 14px; color: #e5e7eb; max-width: 85%; }
        .chat-bubble-user { background: #2A2937; border-radius: 16px; padding: 16px; font-size: 14px; color: #ffffff; max-width: 85%; align-self: flex-end; }
    </style>
</head>
<body class="flex h-screen w-full">
    <aside class="w-[280px] bg-[#111018] border-r border-[#2A2937] flex flex-col">
        <div class="h-[80px] flex items-center px-6 gap-3 pt-4"><span class="font-bold text-xl text-white">Nebulytics</span></div>
        <nav class="flex-1 px-4 py-8 space-y-1">
            <div class="nav-link active" data-target="panel"><i data-lucide="layout-dashboard"></i> Panel de Control</div>
            <div class="nav-link" data-target="chat"><i data-lucide="message-square"></i> Chatbot IA</div>
        </nav>
    </aside>

    <main class="flex-1 bg-[#111018] h-screen overflow-y-auto p-10 relative">
        <div id="tab-panel" class="tab-content active max-w-5xl mx-auto">
            <h2 class="text-3xl font-bold text-white mb-8">Panel de Control</h2>
            <div class="n-card mb-8 p-8"><div class="w-full h-[320px]"><canvas id="lineChart"></canvas></div></div>
        </div>

        <div id="tab-chat" class="tab-content max-w-2xl mx-auto h-[calc(100vh-80px)]">
            <div class="n-card h-full flex flex-col p-0">
                <div class="p-4 border-b border-[#2A2937] flex justify-between bg-[#15141f]">
                    <h3 class="font-bold text-white">Nebulytics IA</h3>
                </div>
                <div class="flex-1 p-6 overflow-y-auto flex flex-col gap-6" id="chat-dialogue">
                    <div class="flex gap-3"><div class="chat-bubble-bot">¡Hola! Soy tu asistente IA. ¿En qué te ayudo?</div></div>
                </div>
                <div class="p-4 bg-[#1A1924] border-t border-[#2A2937] flex gap-3">
                    <input type="text" id="chat-input-user" placeholder="Escribe aquí..." class="flex-1 bg-[#111018] border border-[#2A2937] rounded-xl px-4 text-white">
                    <button onclick="processInput()" class="w-12 h-12 bg-[#00e5b5] rounded-xl flex items-center justify-center text-[#111018]"><i data-lucide="send"></i></button>
                </div>
            </div>
        </div>
        <div class="floating-chat" onclick="activateTab('chat')"><i data-lucide="message-square" style="color:black;"></i></div>
    </main>

    <script>
        lucide.createIcons();
        function activateTab(targetId) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelector(`[data-target="${targetId}"]`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${targetId}`).classList.add('active');
            if(targetId === 'panel') setTimeout(initChartLine, 50);
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function() { activateTab(this.getAttribute('data-target')); });
        });

        async function processInput() {
            const input = document.getElementById('chat-input-user');
            const val = input.value.trim();
            if(!val) return;
            
            const dialog = document.getElementById('chat-dialogue');
            dialog.insertAdjacentHTML('beforeend', `<div class="flex flex-col"><div class="chat-bubble-user">${val}</div></div>`);
            input.value = '';
            
            const typingId = 'typing-' + Date.now();
            dialog.insertAdjacentHTML('beforeend', `<div id="${typingId}" class="flex gap-3 mt-4"><div class="chat-bubble-bot">Pensando...</div></div>`);
            
            try {
                const res = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val, store_id: "123456" })
                });
                const data = await res.json();
                document.getElementById(typingId).remove();
                dialog.insertAdjacentHTML('beforeend', `<div class="flex gap-3 mt-4"><div class="chat-bubble-bot">${data.response}</div></div>`);
            } catch (e) {
                document.getElementById(typingId).remove();
                dialog.insertAdjacentHTML('beforeend', `<div class="flex gap-3 mt-4"><div class="chat-bubble-bot">Error de conexión.</div></div>`);
            }
        }

        function initChartLine() {
            const ctxLine = document.getElementById('lineChart');
            if(!ctxLine) return;
            new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
                    datasets: [{ label: 'Ventas', data: [180, 210, 190, 240, 280, 260], borderColor: '#00e5b5', borderWidth: 3 }]
                }
            });
        }
        activateTab('panel');
    </script>
</body>
</html>
